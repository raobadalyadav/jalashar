name: jalashar
description: "Jalaram Events — Event & Vendor Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.11

  # i18n
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utilities
  flutter_dotenv: ^5.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dio: ^5.7.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  share_plus: ^10.1.2
  connectivity_plus: ^6.0.3

  # Auth extras
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  local_auth: ^2.3.0
  permission_handler: ^11.3.1

  # Maps & location
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # QR code
  qr_flutter: ^4.1.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  go_router_builder: ^2.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/i18n/
