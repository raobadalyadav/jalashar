# Copy this file to android/keystore.properties and fill in your values.
# NEVER commit the real keystore.properties to git — add it to .gitignore.
#
# Generate keystore:
#   keytool -genkey -v -keystore jalaram-release.jks \
#     -keyalg RSA -keysize 2048 -validity 10000 -alias jalaram
#
storeFile=../jalaram-release.jks
storePassword=YOUR_STORE_PASSWORD
keyAlias=jalaram
keyPassword=YOUR_KEY_PASSWORD
